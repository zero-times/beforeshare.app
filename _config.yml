faq_title                                 : Frequently asked questions about photo privacy on iPhone
faq_intro                                 : Use these quick answers to understand how BeforeShare helps you blur faces, hide license plates, and remove metadata before you share.
faqs                                      :
  - question                              : How do I blur faces in photos on iPhone?
    answer                                : BeforeShare scans photos on-device and helps you blur faces before sharing. See our [guide to blurring faces on iPhone](/blog/how-to-blur-faces-in-photos-on-iphone/).

  - question                              : How do I remove EXIF metadata from a photo?
    answer                                : BeforeShare removes location and EXIF metadata before export. See our [guide to removing EXIF metadata on iPhone](/blog/how-to-remove-exif-from-photos-on-iphone/).

  - question                              : Can I hide a license plate before posting a photo online?
    answer                                : Yes. BeforeShare detects license plates and helps you block them before sharing. See our [license plate privacy guide](/blog/how-to-hide-license-plates-in-photos/).

  - question                              : Does BeforeShare upload my photos?
    answer                                : No. Photos are processed entirely on your device. No uploads. No data collected.

  - question                              : What kinds of private details can BeforeShare detect?
    answer                                : BeforeShare can detect faces, license plates, QR codes, phone numbers, email addresses, and location metadata before you export a cleaner version.

  - question                              : Is BeforeShare only for social media posts?
    answer                                : No. It is also useful for family photos, screenshots, and marketplace listings. You can explore more use cases in our [privacy guides](/blog/).

