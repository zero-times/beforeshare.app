    description                           : Avoid exposing personal information when sharing photos online.

  - title                                 : Sharing Family Photos
    description                           : Protect your children's privacy when posting online.

  - title                                 : Selling a Car Online
    description                           : Hide license plates before posting.

trust_title                               : Privacy First
trust_body                                : BeforeShare processes photos entirely on your device. No photos are uploaded to servers. No data is collected.
