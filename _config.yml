    fontawesome_icon_name                 : car-side

  - title                                 : Remove Photo Metadata
    description                           : Delete location and EXIF data instantly.
    fontawesome_icon_name                 : map-marker-alt

  - title                                 : 100% On-Device Processing
    description                           : Your photos never leave your phone.
    fontawesome_icon_name                 : mobile-alt

steps_title                               : Share safely in three simple steps
steps_intro                               : Pick a photo, let BeforeShare scan it, and send a safer version anywhere.
steps                                     :
  - title                                 : Select a photo
    description                           : Choose any image from your iPhone photo library.

  - title                                 : Scan for privacy risks
    description                           : BeforeShare checks for faces, plates, QR codes, text, and metadata.

  - title                                 : Share safely
    description                           : Export a cleaned photo and post with more confidence.

