<section class="contentSection comparisonSection" aria-labelledby="comparison-title">
	<div class="sectionIntro">
		<p class="sectionEyebrow">{{ site.comparison_title }}</p>
		<h2 id="comparison-title">See exactly what gets cleaned before you share</h2>
		<p>{{ site.comparison_intro }}</p>
	</div>

	<div class="comparisonGrid">
		<figure class="comparisonCard">
			<img src="{{ site.comparison_before_image | relative_url }}" alt="Original photo with the license plate still visible">
			<figcaption>
				<span class="comparisonLabel">{{ site.comparison_before_label }}</span>
			</figcaption>
		</figure>

		<div class="comparisonArrow" aria-hidden="true">&rarr;</div>

		<figure class="comparisonCard">
			<img src="{{ site.comparison_after_image | relative_url }}" alt="Privacy cleaned photo with the license plate blurred">
			<figcaption>
				<span class="comparisonLabel">{{ site.comparison_after_label }}</span>
			</figcaption>
		</figure>
	</div>
</section>
