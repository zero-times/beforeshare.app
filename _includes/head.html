<head>
	<meta charset="utf-8">
	<meta http-equiv="x-ua-compatible" content="ie=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	{% assign meta_title = site.page_title %}
	{% if page.title and page.url != '/' %}
		{% assign meta_title = page.title | append: ' - ' | append: site.app_name %}
	{% endif %}

	<title class="pageTitle">{{ meta_title }}</title>
	<meta name="description" content="{{ page.description | default: site.app_description }}">

{% if site.app_icon %}
	<link rel="shortcut icon" href="{{ site.app_icon | relative_url }}">
{% else %}
	<link rel="shortcut icon" href="">
{% endif %}

	<!-- Smart App Banner -->
	{% if site.enable_smart_app_banner %}
		<meta name="apple-itunes-app" content="app-id={{ site.ios_app_id }}">
	{% endif %}

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css" integrity="sha384-UHRtZLI+pbxtHCWp1t77Bi1L4ZtiqrqD80Kn4Z8NTSRyMA2Fd33n5dQ8lWUE00s/" crossorigin="anonymous">
	<link rel="stylesheet" href="{{ '/main.css' | relative_url }}">
</head>
