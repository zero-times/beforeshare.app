<header class="siteHeader">
	<div class="logo">
		<a class="brandLink" href="{{ '/' | relative_url }}" target="_self" aria-label="{{ site.app_name }} home">
			{% if site.app_icon %}
				<img class="headerIcon" src="{{ site.app_icon | relative_url }}" alt="{{ site.app_name }} icon">
			{% else %}
				<img class="headerIcon" alt="{{ site.app_name }} icon">
			{% endif %}
			<div class="brandCopy">
				<p class="headerName">{{ site.app_name }}</p>
				<p class="headerTag">{{ site.hero_eyebrow }}</p>
			</div>
		</a>
	</div>
		<nav class="scroll" aria-label="Primary">
		<ul>
			<li><a href="{{ '/' | relative_url }}#features" target="_self">Features</a></li>
			<li><a href="{{ '/' | relative_url }}#how-it-works" target="_self">How It Works</a></li>
			<li><a href="{{ '/' | relative_url }}#use-cases" target="_self">Use Cases</a></li>
			<li><a href="{{ '/blog/' | relative_url }}" target="_self">Guides</a></li>
		</ul>
	</nav>
</header>
